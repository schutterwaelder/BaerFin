# BaerFin Spotlight — Compose-Ergaenzungen (offizielles jellyfin/jellyfin-Image)
# ---------------------------------------------------------------------------
# Diese ZWEI Ergaenzungen in den `jellyfin`-Service deiner docker-compose.yml
# einfuegen. Die Live-Datei liegt im Infra-Repo unter
# "VPS-und-Server-Config/Synology NAS (DS918+)/Jellyfin/docker-compose.yml".
#
# Voraussetzung: den Inhalt des Repo-Ordners spotlight/ auf den Host legen,
# z. B. nach /volume1/Media Libary/Jellyfin/abyss/ (siehe README).

services:
  jellyfin:
    # (1) UI VOR dem Start patchen, dann normal starten. Self-healing.
    entrypoint: ["/bin/bash", "-c", "bash /abyss/apply-spotlight.sh; exec /jellyfin/jellyfin"]
    volumes:
      # (2) spotlight/-Inhalt read-only in den Container mounten
      - "/volume1/Media Libary/Jellyfin/abyss:/abyss:ro"
